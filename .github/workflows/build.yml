name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install ldid
        run: brew install ldid

      - name: Build Go binary (iOS arm64)
        run: |
          export SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDKROOT: $SDKROOT"
          CGO_ENABLED=1 GOOS=ios GOARCH=arm64 \
            go build -ldflags="-s -w" -o AutoGoDaemon .
          file AutoGoDaemon
          ls -lh AutoGoDaemon

      - name: Sign with TrollStore entitlements
        run: |
          ldid -Sentitlements.plist AutoGoDaemon
          echo "Signed OK"

      - name: Package IPA
        run: |
          APP="Payload/AutoGoDaemon.app"
          mkdir -p "$APP"

          # 二进制
          cp AutoGoDaemon "$APP/"

          # Info.plist
          cp Info.plist "$APP/"

          # 图标：从根目录 icon.png 用 sips 生成所有必需尺寸
          ICONS="Assets.xcassets/AppIcon.appiconset"
          if [ -f "icon.png" ] && [ ! -f "$ICONS/Icon-60@2x.png" ]; then
            echo "📐 从 icon.png 生成所有图标尺寸..."
            mkdir -p "$ICONS"
            # iPhone 图标
            sips -z 120 120 icon.png --out "$ICONS/Icon-60@2x.png"   # iPhone @2x
            sips -z 180 180 icon.png --out "$ICONS/Icon-60@3x.png"   # iPhone @3x
            # iPad 图标
            sips -z 76  76  icon.png --out "$ICONS/Icon-76.png"      # iPad 1x
            sips -z 152 152 icon.png --out "$ICONS/Icon-76@2x.png"   # iPad @2x
            # App Store
            sips -z 1024 1024 icon.png --out "$ICONS/Icon-1024.png"  # App Store
          elif [ -z "$(ls -A "$ICONS" 2>/dev/null)" ]; then
            echo "⚠️ 没有图标文件，使用默认占位"
            mkdir -p "$ICONS"
            # 创建一个最小占位 PNG (120x120 纯色)
            python3 -c "
import struct, zlib
def create_png(w,h):
    raw=bytearray()
    for y in range(h):
        raw.append(0)
        for x in range(w):
            raw.extend([100,150,255])
    def chunk(ctype,data):
        c=ctype+data
        return struct.pack('>I',len(data))+c+struct.pack('>I',zlib.crc32(c)&0xffffffff)
    ihdr = struct.pack('>IIBBBBB',w,h,8,2,0,0,0)
    return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',ihdr)+chunk(b'IDAT',zlib.compress(bytes(raw)))+chunk(b'IEND',b'')
with open('$ICONS/Icon-60@2x.png','wb') as f: f.write(create_png(120,120))
with open('$ICONS/Icon-60@3x.png','wb') as f: f.write(create_png(180,180))
with open('$ICONS/Icon-76.png','wb')    as f: f.write(create_png(76,76))
with open('$ICONS/Icon-76@2x.png','wb') as f: f.write(create_png(152,152))
with open('$ICONS/Icon-1024.png','wb')  as f: f.write(create_png(1024,1024))
" 2>/dev/null
          fi
          # 复制到 .app bundle
          cp "$ICONS/Icon-60@2x.png" "$APP/AppIcon60x60@2x.png"
          cp "$ICONS/Icon-60@3x.png" "$APP/AppIcon60x60@3x.png"
          cp "$ICONS/Icon-60@2x.png" "$APP/AppIcon60x60.png"    # 无后缀兼容
          cp "$ICONS/Icon-76.png"     "$APP/AppIcon76x76.png"
          cp "$ICONS/Icon-76@2x.png"  "$APP/AppIcon76x76@2x.png"
          cp "$ICONS/Icon-1024.png"   "$APP/iTunesArtwork.png"

          # 打包
          zip -r AutoGoDaemon-1.3.0.ipa Payload
          ls -lh AutoGoDaemon-1.3.0.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AutoGoDaemon-iOS
          path: AutoGoDaemon-1.3.0.ipa
          retention-days: 90
