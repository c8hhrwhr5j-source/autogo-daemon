name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Install ldid
        run: |
          brew install ldid
          which ldid

      - name: Build Go binary (iOS arm64)
        run: |
          export SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDKROOT: $SDKROOT"
          export CGO_CFLAGS="-isysroot $SDKROOT -miphoneos-version-min=12.0"
          export CGO_LDFLAGS="-isysroot $SDKROOT"
          CGO_ENABLED=1 GOOS=ios GOARCH=arm64 \
            go build -ldflags="-s -w" -o AutoGoDaemon .
          file AutoGoDaemon
          ls -lh AutoGoDaemon

      - name: Sign with TrollStore entitlements
        run: |
          ldid -Sentitlements.plist AutoGoDaemon
          echo "Signed OK"

      - name: Package IPA
        run: |
          APP="Payload/AutoGoDaemon.app"
          mkdir -p "$APP"
          cp AutoGoDaemon "$APP/"
          cp Info.plist "$APP/"
          ICONS="Assets.xcassets/AppIcon.appiconset"
          cp "$ICONS/Icon-60@2x.png" "$APP/AppIcon60x60@2x.png"
          cp "$ICONS/Icon-60@3x.png" "$APP/AppIcon60x60@3x.png"
          cp "$ICONS/Icon-76.png"     "$APP/AppIcon76x76.png"
          cp "$ICONS/Icon-76@2x.png"  "$APP/AppIcon76x76@2x.png"
          cp "$ICONS/Icon-1024.png"   "$APP/iTunesArtwork.png"
          zip -r AutoGoDaemon-1.0.0.ipa Payload
          ls -lh AutoGoDaemon-1.0.0.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AutoGoDaemon-iOS
          path: AutoGoDaemon-1.0.0.ipa
          retention-days: 90
