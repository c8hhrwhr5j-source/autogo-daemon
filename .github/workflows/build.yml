name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Install ldid
        run: brew install ldid

      - name: Build Go binary (iOS arm64)
        run: |
          export SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDKROOT: $SDKROOT"
          CGO_ENABLED=1 GOOS=ios GOARCH=arm64 \
            go build -ldflags="-s -w" -o AutoGoDaemon .
          file AutoGoDaemon
          ls -lh AutoGoDaemon

      - name: Sign with TrollStore entitlements
        run: |
          ldid -Sentitlements.plist AutoGoDaemon
          echo "Signed OK"

      - name: Package IPA
        run: |
          APP="Payload/AutoGoDaemon.app"
          mkdir -p "$APP"

          # 二进制
          cp AutoGoDaemon "$APP/"

          # Info.plist
          cp Info.plist "$APP/"

          # 图标：优先使用 Assets 目录，否则用 sips 从根目录 icon.png 生成
          ICONS="Assets.xcassets/AppIcon.appiconset"
          if [ -f "icon.png" ] && [ ! -f "$ICONS/Icon-60@2x.png" ]; then
            echo "📐 从 icon.png 生成所有图标尺寸..."
            mkdir -p "$ICONS"
            # 120x120 = 60@2x
            cp icon.png "$ICONS/Icon-60@2x.png"
            # 180x180 = 60@3x
            cp icon.png "$ICONS/Icon-60@3x.png"
            # 76x76 = iPad
            sips -z 76 76 icon.png --out "$ICONS/Icon-76.png" 2>/dev/null || cp icon.png "$ICONS/Icon-76.png"
            # 152x152 = 76@2x
            sips -z 152 152 icon.png --out "$ICONS/Icon-76@2x.png" 2>/dev/null || cp icon.png "$ICONS/Icon-76@2x.png"
            # 1024x1024 = App Store
            sips -z 1024 1024 icon.png --out "$ICONS/Icon-1024.png" 2>/dev/null || cp icon.png "$ICONS/Icon-1024.png"
          fi
          cp "$ICONS/Icon-60@2x.png" "$APP/AppIcon60x60@2x.png"
          cp "$ICONS/Icon-60@3x.png" "$APP/AppIcon60x60@3x.png"
          cp "$ICONS/Icon-60@2x.png" "$APP/AppIcon60x60.png"
          cp "$ICONS/Icon-76.png"     "$APP/AppIcon76x76.png"
          cp "$ICONS/Icon-76@2x.png"  "$APP/AppIcon76x76@2x.png"
          cp "$ICONS/Icon-1024.png"   "$APP/iTunesArtwork.png"

          # 打包
          zip -r AutoGoDaemon-1.2.0.ipa Payload
          ls -lh AutoGoDaemon-1.2.0.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AutoGoDaemon-iOS
          path: AutoGoDaemon-1.2.0.ipa
          retention-days: 90
